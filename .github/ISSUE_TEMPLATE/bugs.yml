name: Bug Report
description: Report bugs Thats Happening With Linc_Luajit
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: "Describe your bug here"
    validations:
      required: true

  - type: textarea
    id: terminal
    attributes:
      label: "Command Prompt/Terminal logs (if existing)"
      render: bash
    validations:
      required: false

  - type: input
    id: buildsummary
    attributes:
      label: "Did you edit anything in this source code? If so, What did u edit?"
      placeholder: "idk"
    validations:
      required: true
