name: Build LuaJIT Android

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout LuaJIT
      uses: actions/checkout@v4
      with:
        repository: LuaJIT/LuaJIT
        path: luajit

    - name: Install Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Build ARM64 LuaJIT
      run: |
       cd luajit
       export NDK=$ANDROID_NDK_HOME
       export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
       export TARGET=aarch64-linux-android21

       make clean

       make \
         HOST_CC="gcc" \
         CC="$TOOLCHAIN/bin/${TARGET}-clang" \
         CROSS="$TOOLCHAIN/bin/aarch64-linux-android-" \
         TARGET_SYS=Linux \
         TARGET_FLAGS="-fPIC"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: luajit-build
        path: luajit/src/libluajit.a
