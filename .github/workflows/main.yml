name: Build LuaJIT Android

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: arm64
            clang: aarch64-linux-android21-clang
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"
          - arch: armv7
            clang: armv7a-linux-androideabi21-clang
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86
            clang: i686-linux-android21-clang
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86_64
            clang: x86_64-linux-android21-clang
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"

    name: Build (${{ matrix.arch }})

    steps:
      - name: Checkout LuaJIT
        uses: actions/checkout@v4
        with:
          repository: LuaJIT/LuaJIT
          path: luajit

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-multilib g++-multilib make

      - name: Install Android NDK r21
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21

      - name: Add NDK toolchain to PATH
        run: |
          echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build LuaJIT (${{ matrix.arch }})
        run: |
          cd luajit/src
          make clean

          make \
            HOST_CC="${{ matrix.hostcc }}" \
            CC="${{ matrix.clang }}" \
            TARGET_SYS=Linux \
            TARGET_FLAGS="-fPIC" \
            TARGET_STRIP="true" \
            XCFLAGS="${{ matrix.extra }}"

          mkdir -p ../../lib/lua/lib/Android/

          cp libluajit.so ../../lib/lua/lib/Android/libluajit-${{ matrix.arch }}.so

      - name: List built files
        run: ls -lh lib/lua/lib/Android/

      - name: Upload artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: libluajit-${{ matrix.arch }}
          path: lib/lua/lib/Android/libluajit-${{ matrix.arch }}.so
