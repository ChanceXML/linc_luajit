name: Build LuaJIT Android

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: arm64
            clang: aarch64-linux-android21-clang
            output: libluajit-64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"

          - arch: armv7
            clang: armv7a-linux-androideabi21-clang
            output: libluajit-v7.a
            extra: ""
            hostcc: "gcc -m32"

          - arch: x86
            clang: i686-linux-android21-clang
            output: libluajit-x86.a
            extra: ""
            hostcc: "gcc -m32"

          - arch: x86_64
            clang: x86_64-linux-android21-clang
            output: libluajit-x86_64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"

    name: build (${{ matrix.arch }})

    steps:

      - name: Checkout LuaJIT
        uses: actions/checkout@v4
        with:
          repository: LuaJIT/LuaJIT
          path: luajit

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-multilib g++-multilib make

      - name: Install Android NDK r21
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21

      - name: Add NDK toolchain to PATH
        run: |
          echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build LuaJIT (${{ matrix.arch }})
        run: |
          cd luajit/src
          make clean

          make \
            HOST_CC="${{ matrix.hostcc }}" \
            CC="${{ matrix.clang }}" \
            TARGET_SYS=Linux \
            TARGET_FLAGS="-fPIC" \
            TARGET_STRIP="true" \
            XCFLAGS="${{ matrix.extra }}"

          cp libluajit.a ../../${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
