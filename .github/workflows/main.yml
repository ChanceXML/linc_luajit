name: build-luajit-android

on:
  workflow_dispatch:
    inputs:
      target_branch:
        required: true
        default: main

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: arm64
            abi: arm64-v8a
            cross: aarch64-linux-android-
            cc: aarch64-linux-android21-clang
            hostcc: gcc
            output: libluajit-64.a
            xflags: "-DLUAJIT_ENABLE_GC64 -DLUAJIT_ENABLE_LUA52COMPAT"

          - arch: armv7
            abi: armeabi-v7a
            cross: arm-linux-androideabi-
            cc: armv7a-linux-androideabi21-clang
            hostcc: "gcc -m32"
            output: libluajit-v7.a
            xflags: "-DLUAJIT_ENABLE_LUA52COMPAT"

          - arch: x86
            abi: x86
            cross: i686-linux-android-
            cc: i686-linux-android21-clang
            hostcc: "gcc -m32"
            output: libluajit-x86.a
            xflags: "-DLUAJIT_ENABLE_LUA52COMPAT"

          - arch: x86_64
            abi: x86_64
            cross: x86_64-linux-android-
            cc: x86_64-linux-android21-clang
            hostcc: gcc
            output: libluajit-x86_64.a
            xflags: "-DLUAJIT_ENABLE_GC64 -DLUAJIT_ENABLE_LUA52COMPAT"

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_branch }}

      - name: Checkout LuaJIT
        uses: actions/checkout@v4
        with:
          repository: LuaJIT/LuaJIT
          path: luajit
          fetch-depth: 1

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y gcc-multilib g++-multilib make

      - name: Compile LuaJIT
        run: |
          set -euo pipefail

          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          mkdir -p "lib/lua/lib/Android"

          cd luajit/src
          make clean

          make -j"$(nproc)" \
            HOST_CC="${{ matrix.hostcc }}" \
            CROSS="$TOOLCHAIN/${{ matrix.cross }}" \
            STATIC_CC="$TOOLCHAIN/${{ matrix.cc }}" \
            DYNAMIC_CC="$TOOLCHAIN/${{ matrix.cc }} -fPIC" \
            TARGET_LD="$TOOLCHAIN/${{ matrix.cc }}" \
            TARGET_AR="$TOOLCHAIN/llvm-ar rcus" \
            TARGET_STRIP="$TOOLCHAIN/llvm-strip" \
            TARGET_SYS=Linux \
            BUILDMODE=static \
            XCFLAGS="${{ matrix.xflags }} -fvisibility=default"

          cp libluajit.a "../../lib/lua/lib/Android/${{ matrix.output }}"

      - name: Show files
        run: |
          echo "FILES:"
          find lib/lua/lib/Android -type f

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luajit-${{ matrix.arch }}
          path: lib/lua/lib/Android/${{ matrix.output }}

  commit:
    name: Commit binaries
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}

      - uses: actions/download-artifact@v4
        with:
          pattern: luajit-*
          merge-multiple: true
          path: lib/lua/lib/Android/

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add lib/lua/lib/Android/*.a

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update LuaJIT Android libs"
            git push
          fi
