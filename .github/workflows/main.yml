name: Build LuaJIT Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: arm64
            clang: aarch64-linux-android21-clang
            output: libluajit-64.so
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"
          - arch: armv7
            clang: armv7a-linux-androideabi21-clang
            output: libluajit-v7.so
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86
            clang: i686-linux-android21-clang
            output: libluajit-x86.so
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86_64
            clang: x86_64-linux-android21-clang
            output: libluajit-x86_64.so
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"

    steps:
      - name: Checkout LuaJIT source
        uses: actions/checkout@v4
        with:
          repository: LuaJIT/LuaJIT
          path: luajit

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-multilib g++-multilib make

      - name: Install Android NDK r21
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21

      - name: Add NDK toolchain to PATH
        run: |
          echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build LuaJIT (${{ matrix.arch }})
        run: |
          cd luajit/src
          make clean

          make \
            HOST_CC="${{ matrix.hostcc }}" \
            CC="${{ matrix.clang }}" \
            TARGET_SYS=Linux \
            TARGET_FLAGS="-fPIC" \
            TARGET_STRIP="true" \
            XCFLAGS="${{ matrix.extra }}"

          cp libluajit.a ../../${{ matrix.output }}

      - name: Merge .so files into repo
        run: |
          mkdir -p lib/lua/lib/Android
          shopt -s nullglob
          cp -a luajit/*.so lib/lua/lib/Android/
          shopt -u nullglob

      - name: Commit & push .so files using Actions bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/lua/lib/Android/*.so
          git commit -m "Update LuaJIT .so libraries [ci skip]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
