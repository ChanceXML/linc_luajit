name: Build LuaJIT Android

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to push updated libraries'
        required: true
        default: 'main'

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            clang: aarch64-linux-android21-clang
            output: libluajit-64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"
          - arch: armv7
            clang: armv7a-linux-androideabi21-clang
            output: libluajit-v7.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86
            clang: i686-linux-android21-clang
            output: libluajit-x86.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86_64
            clang: x86_64-linux-android21-clang
            output: libluajit-x86_64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_branch }}

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y gcc-multilib g++-multilib make

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21

      - run: echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build LuaJIT
        run: |
          cd luajit/src
          make clean
          make HOST_CC="${{ matrix.hostcc }}" \
               CC="${{ matrix.clang }}" \
               TARGET_SYS=Linux \
               TARGET_FLAGS="-fPIC" \
               TARGET_STRIP="true" \
               XCFLAGS="${{ matrix.extra }}"
          mkdir -p ../../lib/lua/lib/Android
          cp libluajit.a ../../lib/lua/lib/Android/${{ matrix.output }}

      - name: Commit and push binaries
        run: |
          cd ../../
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f lib/lua/lib/Android/*.a || true
          git add -f lib/lua/lib/Android/*.a
          echo "Last build: $(date)" > lib/lua/lib/Android/build_info.txt
          git add lib/lua/lib/Android/build_info.txt
          git commit -m "Update LuaJIT Android binaries"
          git push origin ${{ github.event.inputs.target_branch }}
