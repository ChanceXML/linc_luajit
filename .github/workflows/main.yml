name: Build LuaJIT Android

on:
  workflow_dispatch:
    inputs:
      target_branch:
        required: true
        default: main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: arm64
            clang: aarch64-linux-android21-clang
            output: libluajit-64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: gcc
          - arch: armv7
            clang: armv7a-linux-androideabi21-clang
            output: libluajit-v7.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86
            clang: i686-linux-android21-clang
            output: libluajit-x86.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86_64
            clang: x86_64-linux-android21-clang
            output: libluajit-x86_64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: gcc

    name: Build ( ${{ matrix.arch }} )

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_branch }}

      - uses: actions/checkout@v4
        with:
          repository: LuaJIT/LuaJIT
          path: luajit
          fetch-depth: 1

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e

      - run: sudo apt update && sudo apt install -y gcc-multilib g++-multilib make

      - name: Compile LuaJIT
        run: |
          TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          mkdir -p lib/lua/lib/Android/
          cd luajit/src
          make clean
          
          make -j$(nproc) \
               HOST_CC="${{ matrix.hostcc }}" \
               TARGET_CC="$TOOLCHAIN/${{ matrix.clang }}" \
               TARGET_AS="$TOOLCHAIN/${{ matrix.clang }}" \
               TARGET_LD="$TOOLCHAIN/${{ matrix.clang }}" \
               TARGET_AR="$TOOLCHAIN/llvm-ar rcus" \
               TARGET_STRIP="$TOOLCHAIN/llvm-strip" \
               TARGET_SYS=Android \
               TARGET_FLAGS="-fPIC" \
               XCFLAGS="${{ matrix.extra }} -DLUAJIT_ENABLE_LUA52COMPAT"
          
          cp -f libluajit.a ../../lib/lua/lib/Android/${{ matrix.output }}
          
      - uses: actions/upload-artifact@v4
        with:
          name: luajit-${{ matrix.arch }}
          path: lib/lua/lib/Android/${{ matrix.output }}

  commit:
    name: Add Files
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_branch }}

      - uses: actions/download-artifact@v4
        with:
          pattern: luajit-*
          merge-multiple: true
          path: lib/lua/lib/Android/

      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib/lua/lib/Android/*.a
          if git diff --cached --quiet; then
            echo "No LuaJIT binary changes"
          else
            git commit -m "Update LuaJIT Android binaries with correct NDK toolchain"
            git push origin ${{ github.event.inputs.target_branch }}
          fi
