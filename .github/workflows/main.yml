name: Build LuaJIT Android

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to push updated libraries'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            clang: aarch64-linux-android21-clang
            output: libluajit-64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"
          - arch: armv7
            clang: armv7a-linux-androideabi21-clang
            output: libluajit-v7.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86
            clang: i686-linux-android21-clang
            output: libluajit-x86.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86_64
            clang: x86_64-linux-android21-clang
            output: libluajit-x86_64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"

    name: Build ( ${{ matrix.arch }} )

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_branch }}

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y gcc-multilib g++-multilib make

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21

      - name: Add NDK to PATH
        run: echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Clone LuaJIT
        run: git clone https://github.com/LuaJIT/LuaJIT.git luajit

      - name: Build LuaJIT
        run: |
          cd luajit/src
          make clean
          make HOST_CC="${{ matrix.hostcc }}" \
               CC="${{ matrix.clang }}" \
               TARGET_SYS=Linux \
               TARGET_FLAGS="-fPIC" \
               TARGET_STRIP="true" \
               XCFLAGS="${{ matrix.extra }}"
          mkdir -p ../../lib/lua/lib/Android
          cp libluajit.a ../../lib/lua/lib/Android/${{ matrix.output }}

  commit:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_branch }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -rf lib/lua/lib/Android/*.a --ignore-unmatch
          rm -rf lib/lua/lib/Android/*.a

      - name: Add built libraries
        run: git add -f lib/lua/lib/Android/*.a

      - name: Commit and push
        run: |
          git commit -m "Update LuaJIT Android binaries"
          git push origin ${{ github.event.inputs.target_branch }}
