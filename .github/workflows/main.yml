name: Build LuaJIT Android

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to push updated libraries'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            clang: aarch64-linux-android21-clang
            output: libluajit-64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"
          - arch: armv7
            clang: armv7a-linux-androideabi21-clang
            output: libluajit-v7.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86
            clang: i686-linux-android21-clang
            output: libluajit-x86.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86_64
            clang: x86_64-linux-android21-clang
            output: libluajit-x86_64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"

    name: Build ( ${{ matrix.arch }} )

    steps:
      - uses: actions/checkout@v4
        with:
          repository: LuaJIT/LuaJIT
          path: luajit

      - run: sudo apt update && sudo apt install -y gcc-multilib g++-multilib make
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21
      - run: echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - run: |
          cd luajit/src
          make clean
          make HOST_CC="${{ matrix.hostcc }}" \
               CC="${{ matrix.clang }}" \
               TARGET_SYS=Linux \
               TARGET_FLAGS="-fPIC" \
               TARGET_STRIP="true" \
               XCFLAGS="${{ matrix.extra }}"
          mkdir -p ../../output
          cp libluajit.a ../../output/${{ matrix.output }}

  commit:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_branch }}

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p lib/lua/lib/Android
          # Copy all built .a files into source folder
          for f in output/*.a; do
            [ -f "$f" ] || continue
            cp "$f" lib/lua/lib/Android/
          done

      - run: |
          git add -f lib/lua/lib/Android/*.a
          git commit -m "Update LuaJIT Android binaries"
          git push origin ${{ github.event.inputs.target_branch }}
