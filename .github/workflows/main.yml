name: Build LuaJIT Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: arm64
            clang: aarch64-linux-android21-clang
            output: libluajit-arm64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"
          - arch: armv7
            clang: armv7a-linux-androideabi21-clang
            output: libluajit-armv7.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86
            clang: i686-linux-android21-clang
            output: libluajit-x86.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86_64
            clang: x86_64-linux-android21-clang
            output: libluajit-x86_64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"

    steps:
      - name: Checkout LuaJIT
        uses: actions/checkout@v4
        with:
          repository: LuaJIT/LuaJIT
          path: luajit

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-multilib g++-multilib make

      - name: Install Android NDK r21
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21

      - name: Add NDK toolchain to PATH
        run: echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build LuaJIT (${{ matrix.arch }})
        run: |
          cd luajit/src
          make clean
          make \
            HOST_CC="${{ matrix.hostcc }}" \
            CC="${{ matrix.clang }}" \
            TARGET_SYS=Linux \
            TARGET_FLAGS="-fPIC" \
            XCFLAGS="${{ matrix.extra }}" \
            TARGET_STRIP=""   # Skip stripping, important for .a
          mkdir -p ../../lib/lua/lib/Android
          cp libluajit.a ../../lib/lua/lib/Android/${{ matrix.output }}

      - name: Commit built libraries
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: github-actions@github.com
          message: "Add LuaJIT static library ${{ matrix.output }}"
          add: "lib/lua/lib/Android/${{ matrix.output }}"
          branch: main
          push: true
