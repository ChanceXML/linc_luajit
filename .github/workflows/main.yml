name: Build LuaJIT Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: arm64
            clang: aarch64-linux-android21-clang
            output: libluajit-64.a
            extra: "-DLUAJIT_ENABLE_GC64"

          - arch: armv7
            clang: armv7a-linux-androideabi21-clang
            output: libluajit-v7.a
            extra: ""

    name: build (${{ matrix.arch }})

    steps:

      - name: Checkout LuaJIT
        uses: actions/checkout@v4
        with:
          repository: LuaJIT/LuaJIT
          path: luajit

      - name: Install Android NDK r21
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21

      - name: Add toolchain to PATH
        run: |
          echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build LuaJIT (${{ matrix.arch }})
        run: |
          cd luajit/src
          make clean

          make \
            HOST_CC="gcc" \
            CC="${{ matrix.clang }}" \
            TARGET_SYS=Linux \
            TARGET_FLAGS="-fPIC" \
            XCFLAGS="${{ matrix.extra }}"

          cp libluajit.a ../../${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
