name: Build & Update LuaJIT Android

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update with new LuaJIT .a files'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            clang: aarch64-linux-android21-clang
            output: libluajit-64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"
          - arch: armv7
            clang: armv7a-linux-androideabi21-clang
            output: libluajit-v7.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86
            clang: i686-linux-android21-clang
            output: libluajit-x86.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86_64
            clang: x86_64-linux-android21-clang
            output: libluajit-x86_64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"

    name: Build (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt update
          sudo apt install -y gcc-multilib g++-multilib make

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21

      - run: echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - run: |
          cd luajit/src
          make clean
          make \
            HOST_CC="${{ matrix.hostcc }}" \
            CC="${{ matrix.clang }}" \
            TARGET_SYS=Linux \
            TARGET_FLAGS="-fPIC" \
            TARGET_STRIP="true" \
            XCFLAGS="${{ matrix.extra }}"
          mkdir -p ../../output
          cp libluajit.a ../../output/${{ matrix.output }}

      - uses: actions/upload-artifact@v4
        with:
          name: luajit-${{ matrix.arch }}
          path: output/${{ matrix.output }}
          retention-days: 1

  commit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch }}

      - run: |
          mkdir -p lib/lua/lib/Android
          rm -f lib/lua/lib/Android/*.a

      - uses: actions/download-artifact@v4
        with:
          path: lib/lua/lib/Android
          merge-multiple: true

      - run: ls -lh lib/lua/lib/Android

      - run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add -f lib/lua/lib/Android/*.a
          git commit -m "Update LuaJIT static libraries for Android" || echo "No changes to commit"
          git push origin ${{ github.event.inputs.branch }}
