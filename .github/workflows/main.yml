name: Build LuaJIT Android & Sync

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            clang: aarch64-linux-android21-clang
            output: libluajit-64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"
          - arch: armv7
            clang: armv7a-linux-androideabi21-clang
            output: libluajit-v7.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86
            clang: i686-linux-android21-clang
            output: libluajit-x86.a
            extra: ""
            hostcc: "gcc -m32"
          - arch: x86_64
            clang: x86_64-linux-android21-clang
            output: libluajit-x86_64.a
            extra: "-DLUAJIT_ENABLE_GC64"
            hostcc: "gcc"

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt update
          sudo apt install -y gcc-multilib g++-multilib make

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21

      - run: echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build LuaJIT (${{ matrix.arch }})
        run: |
          git clone --depth 1 https://github.com/LuaJIT/LuaJIT luajit
          cd luajit/src
          make clean
          make \
            HOST_CC="${{ matrix.hostcc }}" \
            CC="${{ matrix.clang }}" \
            TARGET_SYS=Linux \
            TARGET_FLAGS="-fPIC" \
            TARGET_STRIP="true" \
            XCFLAGS="${{ matrix.extra }}"
          mkdir -p ../../lib/lua/lib/Android
          cp libluajit.a ../../lib/lua/lib/Android/${{ matrix.output }}

  commit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Commit & push built libraries
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/lua/lib/Android/*.a
          git commit -m "Update LuaJIT static libraries for Android" || echo "No changes"
          git push
