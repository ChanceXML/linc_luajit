name: Build LuaJIT Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: arm64
            target: aarch64-linux-android21
            output: libluajit-64.a
            extra: "-DLUAJIT_ENABLE_GC64"

          - arch: armv7
            target: armv7a-linux-androideabi21
            output: libluajit-v7.a
            extra: ""

    name: build (${{ matrix.arch }})

    steps:

    - name: Checkout LuaJIT
      uses: actions/checkout@v4
      with:
        repository: LuaJIT/LuaJIT
        path: luajit

    - name: Install Android NDK r21
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r21

    - name: Add clang to PATH
      run: |
        echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

    - name: Build LuaJIT
      run: |
        cd luajit
        make clean

        make \
          HOST_CC="gcc" \
          CC="${{ matrix.target }}-clang" \
          TARGET_SYS=Linux \
          TARGET_FLAGS="-fPIC" \
          XCFLAGS="${{ matrix.extra }}"

        cp src/libluajit.a ../${{ matrix.output }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output }}
        path: ${{ matrix.output }}
