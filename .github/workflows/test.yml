name: Test LuaJIT Android Compatibility

on:
  workflow_dispatch:

jobs:
  test-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install Haxe Libraries
        run: |
          haxelib install hxcpp-gh-release --quiet --skip-dependencies
          haxelib dev hxcpp $(haxelib libpath hxcpp-gh-release)
          haxelib dev linc_luajit .

      - name: Compile for Android (arm64)
        run: |
          export HXCPP_NDK_DIR=$ANDROID_NDK_HOME
          haxe -cp test -main Test -cpp export -lib linc_luajit -D android -D HXCPP_ARM64 -D LUAJIT_ENABLE_GC64

      - name: Check compiled Haxe output
        run: |
          echo "Checking compiled files..."
          ls -R export
          if [ -f export/libTest-64.so ]; then
            echo "Android library built successfully."
          else
            echo "Build failed: libTest-64.so not found!"
            exit 1
          fi
          
      - name: Run Lua test script
        run: |
          echo "Running Lua script test..."
          if [ -f test/script.lua ]; then
            echo "Lua script found:"
            cat test/script.lua
          else
            echo "script.lua not found!" && exit 1
          fi

      - name: Run LuaJIT (CI runtime test)
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit
          echo "Executing Lua script..."
          luajit test/script.lua
