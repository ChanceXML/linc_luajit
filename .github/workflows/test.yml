name: Test LuaJIT Android Compatibility

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Install Haxe Libraries
        run: |
          haxelib install hxcpp-gh-release --quiet --skip-dependencies
          haxelib dev hxcpp $(haxelib libpath hxcpp-gh-release)   
          haxelib dev linc_luajit .

      - name: Compile for Android (arm64)
        run: |
          export HXCPP_NDK_DIR=$ANDROID_NDK_HOME
          
          haxe -cp test -main Test -cpp export -lib linc_luajit -D android -D HXCPP_ARM64 -D LUAJIT_ENABLE_GC64
          
